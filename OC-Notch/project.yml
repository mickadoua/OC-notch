name: OC-Notch
options:
  bundleIdPrefix: com.oc-notch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true

targets:
  OC-Notch:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oc-notch.app
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_NAME: OC-Notch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_ENTITLEMENTS: Sources/App/OC_Notch.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: Sources/App/OC_Notch.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
